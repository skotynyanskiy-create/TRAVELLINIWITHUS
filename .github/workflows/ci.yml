name: CI

on:
  push:
    branches: [ main, 'codex/**', 'feat/**', 'fix/**' ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Audit UI
        run: npm run audit:ui

      - name: Audit Firebase
        run: npm run audit:firebase

      - name: Audit Stripe
        run: npm run audit:stripe

  audit-agents:
    name: Audit Agent Stack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit agent stack sync
        run: npm run audit:agents

  audit-visual:
    name: Audit Visual (Playwright)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Run visual audit
        run: npm run audit:visual
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Upload visual audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-audit-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
