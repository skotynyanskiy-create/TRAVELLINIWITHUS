name: CI

on:
  push:
    branches: [ main, 'codex/**', 'feat/**', 'fix/**' ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Audit UI
        run: npm run audit:ui

      - name: Audit Firebase
        run: npm run audit:firebase

      - name: Audit Stripe
        run: npm run audit:stripe
